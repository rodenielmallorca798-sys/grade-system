<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>BSIT 3B — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:      #070910;
            --accent:  #5bffa0;
            --accent2: #56c8ff;
            --text:    #e8ecf0;
            --muted:   #4a5568;
            --surface: #0f1117;
            --border:  #1c2030;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body { width: 100%; }

        body {
            font-family: 'DM Mono', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            padding: 16px;
        }

        .grid-bg {
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(91,255,160,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(91,255,160,0.03) 1px, transparent 1px);
            background-size: 48px 48px;
            animation: gridDrift 20s linear infinite;
            pointer-events: none;
        }
        @keyframes gridDrift { 0% { transform: translate(0,0); } 100% { transform: translate(48px,48px); } }

        .orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.18; animation: orbFloat 8s ease-in-out infinite; pointer-events: none; }
        .orb1 { width: clamp(160px,45vw,400px); height: clamp(160px,45vw,400px); background: var(--accent);  top: -80px; left: -80px; }
        .orb2 { width: clamp(120px,35vw,300px); height: clamp(120px,35vw,300px); background: var(--accent2); bottom: -60px; right: -60px; animation-delay: -4s; }
        @keyframes orbFloat { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(30px,20px) scale(1.1); } }

        .scanline {
            position: fixed; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, rgba(91,255,160,0.4), transparent);
            animation: scan 4s linear infinite; pointer-events: none;
        }
        @keyframes scan { 0% { top:-2px; opacity:0; } 10% { opacity:1; } 90% { opacity:1; } 100% { top:100vh; opacity:0; } }

        .card {
            position: relative; z-index: 10;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: clamp(24px, 6vw, 52px) clamp(18px, 5vw, 48px);
            width: 100%;
            max-width: 440px;
            text-align: center;
            box-shadow: 0 0 0 1px rgba(91,255,160,0.05), 0 40px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
            animation: cardIn 0.8s cubic-bezier(0.16,1,0.3,1) both;
        }
        @keyframes cardIn { from { opacity:0; transform:translateY(32px) scale(0.96); } to { opacity:1; transform:translateY(0) scale(1); } }

        .badge {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: clamp(9px, 2vw, 10px); font-weight: 500; letter-spacing: 3px; text-transform: uppercase;
            color: var(--accent); border: 1px solid rgba(91,255,160,0.3); background: rgba(91,255,160,0.06);
            padding: 5px 14px; border-radius: 50px; margin-bottom: clamp(14px, 4vw, 28px);
        }
        .badge-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: blink 1.5s ease-in-out infinite; flex-shrink: 0; }
        @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.2; } }

        .logo {
            font-family: 'Syne', sans-serif;
            font-size: clamp(28px, 9vw, 42px);
            font-weight: 900; line-height: 1; letter-spacing: -2px; margin-bottom: 6px;
            background: linear-gradient(135deg, #ffffff 0%, var(--accent) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }

        .subtitle {
            font-size: clamp(9px, 2.5vw, 12px); color: var(--muted); letter-spacing: 1px;
            margin-bottom: clamp(20px, 5vw, 40px); line-height: 1.6;
        }

        .divider { height: 1px; background: linear-gradient(90deg, transparent, var(--border), transparent); margin-bottom: clamp(16px, 4vw, 36px); }

        .info-row {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: clamp(8px, 2vw, 10px); padding: 3px;
            font-size: clamp(10px, 2.5vw, 11px);
        }
        .info-label { color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
        .info-value { color: var(--text); font-weight: 500; }
        .info-value.green { color: var(--accent); }

        .enter-wrap { margin-top: clamp(18px, 5vw, 36px); }

        .btn-enter {
            width: 100%; position: relative;
            background: transparent; border: 1px solid rgba(91,255,160,0.4);
            border-radius: 10px; padding: clamp(13px, 3.5vw, 16px); cursor: pointer;
            overflow: hidden; transition: border-color 0.3s, box-shadow 0.3s;
            -webkit-tap-highlight-color: transparent; touch-action: manipulation;
        }
        .btn-enter::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(91,255,160,0.08), rgba(86,200,255,0.05));
            opacity: 0; transition: opacity 0.3s;
        }
        .btn-enter:hover::before, .btn-enter:focus::before { opacity: 1; }
        .btn-enter:hover, .btn-enter:focus { border-color: var(--accent); box-shadow: 0 0 24px rgba(91,255,160,0.2), 0 0 0 1px rgba(91,255,160,0.1); outline: none; }
        .btn-enter:active { transform: scale(0.98); }

        .btn-inner {
            position: relative; display: flex; align-items: center; justify-content: center; gap: 10px;
            font-family: 'Syne', sans-serif; font-size: clamp(11px, 3vw, 13px);
            font-weight: 700; letter-spacing: clamp(2px, 0.5vw, 3px); text-transform: uppercase; color: var(--accent);
        }
        .btn-key {
            display: inline-flex; align-items: center; justify-content: center;
            width: 28px; height: 20px; flex-shrink: 0;
            background: rgba(91,255,160,0.1); border: 1px solid rgba(91,255,160,0.3);
            border-radius: 4px; font-size: 10px; color: var(--accent);
            font-family: 'DM Mono', monospace; font-weight: 400;
        }

        .hint-text { margin-top: 14px; font-size: clamp(9px, 2vw, 10px); color: var(--muted); letter-spacing: 0.5px; line-height: 1.6; }

        .corner { position: absolute; width: 12px; height: 12px; border-color: rgba(91,255,160,0.3); border-style: solid; }
        .corner-tl { top:-1px; left:-1px;   border-width: 2px 0 0 2px; border-radius: 3px 0 0 0; }
        .corner-tr { top:-1px; right:-1px;  border-width: 2px 2px 0 0; border-radius: 0 3px 0 0; }
        .corner-bl { bottom:-1px; left:-1px;  border-width: 0 0 2px 2px; border-radius: 0 0 0 3px; }
        .corner-br { bottom:-1px; right:-1px; border-width: 0 2px 2px 0; border-radius: 0 0 3px 0; }

        /* very small screens */
        @media (max-width: 360px) {
            .logo { letter-spacing: -1px; }
            .badge { letter-spacing: 1.5px; padding: 4px 10px; }
            .btn-inner { letter-spacing: 1.5px; }
        }
    </style>
</head>
<body>

<div class="grid-bg"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="scanline"></div>

<div class="card">
    <span class="corner corner-tl"></span>
    <span class="corner corner-tr"></span>
    <span class="corner corner-bl"></span>
    <span class="corner corner-br"></span>

    <div class="badge"><span class="badge-dot"></span>Rodeniel Mallorca Online Grading System</div>
    <div class="logo">BSIT 3B</div>
    <div class="subtitle">Grade Management System &nbsp;&bull;&nbsp; A.Y. 2025–2026</div>
    <div class="divider"></div>

    <div class="info-row">
        <span class="info-label">Semester</span>
        <span class="info-value">2nd Semester</span>
    </div>
    <div class="info-row">
        <span class="info-label">Scale</span>
        <span class="info-value">95 – 75</span>
    </div>
    <div class="info-row">
        <span class="info-label">Passing Grade</span>
        <span class="info-value green">75</span>
    </div>
    <div class="info-row">
        <span class="info-label">Subjects</span>
        <span class="info-value">5 Subjects</span>
    </div>

    <div class="enter-wrap">
        <button class="btn-enter" id="enterBtn" onclick="login()">
            <div class="btn-inner">
                <span class="btn-key">↵</span>
                Press Enter to Open
            </div>
        </button>
    </div>

    <p class="hint-text">2nd Sem A.Y. 2025–2026 &nbsp;·&nbsp; BSIT 3B Class</p>
</div>

<script>
    function login() {
        sessionStorage.setItem('logged_in', 'true');
        window.location.href = 'main.html';
    }
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') login();
    });
</script>

</body>
</html>
